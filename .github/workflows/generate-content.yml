name: Generate Content

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 06:00 台灣時間
  workflow_dispatch:

# 需要 contents:write 提交內容，pages/id-token 部署 Pages
# （用 GITHUB_TOKEN 推的 commit 不會觸發 deploy-pages workflow，所以本 workflow 生成後自己部署）
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content
        run: python src/generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "無新內容"
          else
            git commit -m "chore: 每日內容 $(date -u +%Y-%m-%d)"
            git push
          fi

      # 直接用當前工作目錄（已含新生成內容）部署 Pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
